# Blueprint Render — opcional. Pode criar serviços manualmente no dashboard também.
# https://dashboard.render.com/blueprints

services:
  - type: web
    name: raizes-store-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: raizes-store-db
          property: connectionString

databases:
  - name: raizes-store-db
    plan: starter
    databaseName: raizesstore
    user: raizesstore
