<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" role="img" aria-label="Camiseta Coleçăo GFB Os 7 Raios">
  <defs>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="400" height="520" fill="#1a1a2e"/>
  <text x="200" y="36" text-anchor="middle" fill="#c9b896" font-family="Georgia, serif" font-size="14" letter-spacing="3">COLEÇĂO GFB</text>

  <path d="M120 70 L90 95 L70 180 L95 185 L100 440 L300 440 L305 185 L330 180 L310 95 L280 70 L240 88 L200 78 L160 88 Z" fill="url(#shirt)" stroke="#bbb" stroke-width="2"/>

  <text x="200" y="155" text-anchor="middle" fill="#2c2c2c" font-family="Georgia, serif" font-size="22" font-weight="bold">Os 7 Raios</text>

  <g transform="translate(200 265)">
    <circle cx="0" cy="0" r="12" fill="#1f2937"/>

    <path d="M0,0 L-18,-78 A82,82 0 0,1 18,-78 Z" fill="#1d4ed8"/>
    <text transform="rotate(-90 0 -46)" x="0" y="-46" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="9" font-weight="700" filter="url(#textShadow)">Fé</text>

    <path d="M0,0 L18,-78 A82,82 0 0,1 52,-58 Z" fill="#ca8a04"/>
    <text transform="rotate(-58 30 -50)" x="30" y="-50" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="7.5" font-weight="700">Sabedoria</text>

    <path d="M0,0 L52,-58 A82,82 0 0,1 74,-12 Z" fill="#db2777"/>
    <text transform="rotate(-28 56 -30)" x="56" y="-30" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="5.8" font-weight="700" filter="url(#textShadow)">Amor incondicional</text>

    <path d="M0,0 L74,-12 A82,82 0 0,1 62,42 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text transform="rotate(8 58 12)" x="58" y="12" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="8" font-weight="700">Pureza</text>

    <path d="M0,0 L62,42 A82,82 0 0,1 0,78 Z" fill="#15803d"/>
    <text transform="rotate(52 26 48)" x="26" y="48" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="8" font-weight="700" filter="url(#textShadow)">Cura</text>

    <path d="M0,0 L0,78 A82,82 0 0,1 -62,42 Z" fill="#9f1239"/>
    <text transform="rotate(98 -4 50)" x="-4" y="50" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="8" font-weight="700" filter="url(#textShadow)">Paz</text>

    <path d="M0,0 L-62,42 A82,82 0 0,1 -74,-12 Z" fill="#5b21b6"/>
    <text transform="rotate(142 -50 14)" x="-50" y="14" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="6.5" font-weight="700" filter="url(#textShadow)">Transmutaçăo</text>
  </g>

  <g transform="translate(200 108)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#8b7355" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#f5f0e8" stroke="#8b7355" stroke-width="1"/>
    <text x="0" y="-4" text-anchor="middle" fill="#5c4a32" font-family="Georgia, serif" font-size="7" font-weight="bold">GFB</text>
    <text x="0" y="6" text-anchor="middle" fill="#5c4a32" font-family="Georgia, serif" font-size="5">COLEÇĂO</text>
  </g>
  <text x="200" y="98" text-anchor="middle" fill="#888" font-size="9">(selo nas costas)</text>
</svg>
